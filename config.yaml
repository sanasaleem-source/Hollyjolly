# AI Production Studio — Configuration
# Edit paths after running setup.py

# AI Provider — options: gemini | ollama
llm_provider: gemini
image_provider: imagen

# Gemini (Google AI Studio) — get key at aistudio.google.com/app/apikey
gemini_api_key: GEMINI_API_KEY_HERE
gemini_model: gemini-1.5-pro

# Ollama (local fallback) — install from ollama.ai
ollama_url: http://localhost:11434
ollama_model: llama3

# External tools — setup.py fills these in automatically
godot_path: godot
blender_path: blender
ffmpeg_path: ./bin/ffmpeg

# Storage
storage_path: ./storage

# Pipeline settings
max_repair_attempts: 3
render_timeout_seconds: 300
render_fps: 24
render_width: 1920
render_height: 1080
